<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Leakage Detector</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* GLASS CARD */
.container {
  width: 520px;
  padding: 25px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);

  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* DROP ZONE */
#drop-zone {
  border: 2px dashed rgba(255,255,255,0.2);
  padding: 30px;
  text-align: center;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

#drop-zone:hover {
  border-color: #38bdf8;
  background: rgba(56,189,248,0.1);
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 110px;
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.3);
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(90deg, #38bdf8, #22c55e);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.stat-box {
  flex: 1;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  background: rgba(0,0,0,0.4);
}

/* RESULT */
#result {
  margin-top: 15px;
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  max-height: 180px;
  overflow-y: auto;
  font-size: 13px;
}

/* HIGHLIGHT */
.highlight-email {
  color: #22c55e;
  font-weight: bold;
}

.highlight-phone {
  color: #38bdf8;
  font-weight: bold;
}

/* LOADING */
#loading {
  text-align: center;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔍 Data Leakage Detector</h1>

  <div id="drop-zone">
    📂 Drag & Drop or Click
    <input type="file" id="file-input" hidden>
  </div>

  <textarea id="text-input" placeholder="Paste text here...">
John Doe works at Google.
Email: john@gmail.com
Phone: +1 987-654-3210
Location: New York
  </textarea>

  <button onclick="scanText()">Scan Data</button>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-box">📧 Emails: <span id="email-count">0</span></div>
    <div class="stat-box">📱 Phones: <span id="phone-count">0</span></div>
  </div>

  <div id="loading">⏳ Scanning...</div>

  <div id="result"></div>
</div>

<script>
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");

dropZone.onclick = () => fileInput.click();

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  uploadFile(e.dataTransfer.files[0]);
});

dropZone.addEventListener("dragover", (e) => e.preventDefault());

fileInput.addEventListener("change", () => {
  uploadFile(fileInput.files[0]);
});

function uploadFile(file) {
  const formData = new FormData();
  formData.append("file", file);

  showLoading();

  fetch("/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => displayResult(data.result));
}

function scanText() {
  const text = document.getElementById("text-input").value;

  showLoading();

  fetch("/detect", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  })
  .then(res => res.json())
  .then(data => displayResult(data));
}

function showLoading() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("result").innerHTML = "";
}

function displayResult(data) {
  document.getElementById("loading").style.display = "none";

  document.getElementById("email-count").innerText = data.email.length;
  document.getElementById("phone-count").innerText = data.phone.length;

let output = `
<h3>📊 Detection Results</h3>

<b>📧 Emails:</b><br>${data.email.join("<br>")}<br><br>
<b>📱 Phones:</b><br>${data.phone.join("<br>")}<br><br>
<b>👤 Names:</b><br>${data.names.join("<br>")}<br><br>
<b>🏢 Orgs:</b><br>${data.organizations.join("<br>")}<br><br>
<b>🌍 Locations:</b><br>${data.locations.join("<br>")}
`;
  data.email.forEach(e => {
    output += `<div class="highlight-email">📧 ${e}</div>`;
  });

  data.phone.forEach(p => {
    output += `<div class="highlight-phone">📱 ${p}</div>`;
  });

  document.getElementById("result").innerHTML = output || "✅ No sensitive data found";
  document.getElementById("result").innerHTML =
  `<h3>⚠️ Risk Level: ${data.risk_level}</h3>` + output;
}
</script>

</body>
</html>
