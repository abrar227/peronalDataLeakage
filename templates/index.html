<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Leakage Detector</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h1>🔍 Data Leakage Detector</h1>

  <div id="drop-zone">
    📂 Drag & Drop a file or Click to Upload
    <input type="file" id="file-input" hidden>
  </div>

  <textarea id="text-input">John Doe works at Google.
Email: john@gmail.com
Phone: +1 987-654-3210
Location: New York</textarea>

  <button onclick="scanText()">Scan Data</button>

  <div class="stats">
    <div class="stat-box">📧 Emails: <span id="email-count">0</span></div>
    <div class="stat-box">📱 Phones: <span id="phone-count">0</span></div>
  </div>

  <div id="loading" class="hidden">⏳ Scanning...</div>

  <div id="resultBox" class="hidden">
    <h3>⚠️ Risk Level: <span id="risk"></span></h3>
    <div id="entities"></div>
    <div id="highlightedText"></div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
